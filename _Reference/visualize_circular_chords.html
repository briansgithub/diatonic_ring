            if (btnPlayPause) btnPlayPause.textContent = 'Play';
            
            // Update scrub bar to refresh loop markers
            const timeline = state.timelines[state.currentSectionIndex];
            if (timeline) {
                const maxBeat = Math.max(
                    ...timeline.chords.map(c => c.beat + c.duration),
                    ...timeline.notes.map(n => n.beat + n.duration)
                );
                updateScrubBar(maxBeat);
            }
        }

        function updateControlStyles() {
            if (btnPlayPause) {
                btnPlayPause.classList.toggle('active', state.playbackMode === 'synth');
            }
        }

        function startLoop() {
            if (state.animId) cancelAnimationFrame(state.animId);
            
            function loop() {
                if (!state.isPlaying || state.isPaused) {
                    state.animId = requestAnimationFrame(loop);
                    return;
                }
                
                let currentBeat = 0;
                
                if (state.playbackMode === 'synth') {
                    // Use Tone.Transport.seconds directly for timing
                    // We need to map this back to "Beat" in the song's timeline.
                    // Assuming Tone BPM is set correctly, Tone.Transport.position would be "bars:beats:sixteenths"
                    // But our `timeToBeat` expects SECONDS relative to video start.
                    // For pure synth playback, we can just treat Tone.Transport.seconds as the elapsed time 
                    // since the start of the section (assuming we reset transport).
                    
                    // Note: We need to handle the offset if the song doesn't start at 0s musically?
                    // Actually, `beatToToneTime` calculated schedules based on (beat-1).
                    // So Tone.Transport.seconds = 0 is Beat 1.
                    // Inverse of beatToToneTime(beat) => beat = (time * bpm / 60) + 1
                    
                    const bpm = (state.tempos[0]?.bpm || 120) * state.tempoMultiplier;
                    // Account for seek offset
                    const elapsedTime = Tone.Transport.seconds + state.seekOffset;
                    currentBeat = (elapsedTime * bpm / 60) + 1;
                    
                    // Check for loop end
                    if (state.loopEndBeat !== null && currentBeat >= state.loopEndBeat) {
                        // Jump to loop start - use seekToPosition logic to maintain smooth playback
                        if (state.loopStartBeat !== null) {
                            const timeline = state.timelines[state.currentSectionIndex];
                            if (timeline) {
                                const maxBeat = Math.max(
                                    ...timeline.chords.map(c => c.beat + c.duration),
                                    ...timeline.notes.map(n => n.beat + n.duration)
                                );
                                
                                if (maxBeat > 0) {
                                    // Calculate percentage for loop start position
                                    const loopStartPercentage = Math.max(0, Math.min(1, (state.loopStartBeat - 1) / maxBeat));
                                    
                                    // Simulate clicking on scrub bar at loop start position
                                    const scrubBarRect = scrubBar.getBoundingClientRect();
                                    const clickX = scrubBarRect.left + (scrubBarRect.width * loopStartPercentage);
                                    
                                    // Use seekToPosition to handle the jump smoothly
                                    // This will reschedule playback and update visuals
                                    seekToPosition(clickX);
                                    
                                    // Recalculate currentBeat after seeking
                                    const bpmAfterSeek = (state.tempos[0]?.bpm || 120) * state.tempoMultiplier;
                                    const elapsedTimeAfterSeek = Tone.Transport.seconds + state.seekOffset;
                                    currentBeat = (elapsedTimeAfterSeek * bpmAfterSeek / 60) + 1;
                                    
                                    // Continue loop normally - progress bar will update in next frame
                                }
                            }
                        }
                    }
                    
                    // Check if song is finished
                    const timeline = state.timelines[state.currentSectionIndex];
                    if (timeline && !state.isFinished) {
                        const chordBeats = timeline.chords.length > 0 
                            ? timeline.chords.map(c => c.beat + c.duration)
                            : [0];
                        const noteBeats = timeline.notes.length > 0
                            ? timeline.notes.map(n => n.beat + n.duration)
                            : [0];
                        const maxBeat = Math.max(...chordBeats, ...noteBeats);
                        
                        // Only finish if not looping
                        if (maxBeat > 0 && currentBeat >= maxBeat && state.loopEndBeat === null) {
                            // Song finished
                            state.isFinished = true;
                            Tone.Transport.stop();
                            state.isPlaying = false;
                            state.isPaused = false;
                            if (btnPlayPause) btnPlayPause.textContent = 'Restart';
                            // Update scrub bar to show completion
                            updateScrubBar(maxBeat);
                            updateVisuals(maxBeat);
                            return; // Stop the loop
                        }
                    }
                    
                    // Update scrub bar (unless user is dragging)
                    if (!state.isScrubbing) {
                        updateScrubBar(currentBeat);
                    }
                }
                
                updateVisuals(currentBeat);
                state.animId = requestAnimationFrame(loop);
            }
            loop();
        }

        function updateScrubBar(currentBeat) {
            if (!scrubBarProgress || !state.timelines || !state.timelines[state.currentSectionIndex]) return;
            
            const timeline = state.timelines[state.currentSectionIndex];
            const chordBeats = timeline.chords.length > 0 
                ? timeline.chords.map(c => c.beat + c.duration)
                : [0];
            const noteBeats = timeline.notes.length > 0
                ? timeline.notes.map(n => n.beat + n.duration)
                : [0];
            const maxBeat = Math.max(...chordBeats, ...noteBeats);
            
            if (maxBeat > 0) {
                const percentage = Math.max(0, Math.min(100, (currentBeat / maxBeat) * 100));
                scrubBarProgress.style.width = percentage + '%';
                
                // Update loop markers
                if (state.loopStartBeat !== null && loopMarkerStart) {
                    const startPercentage = Math.max(0, Math.min(100, (state.loopStartBeat / maxBeat) * 100));
                    loopMarkerStart.style.left = startPercentage + '%';
                    loopMarkerStart.style.display = 'block';
                }
                
                if (state.loopEndBeat !== null && loopMarkerEnd) {
                    const endPercentage = Math.max(0, Math.min(100, (state.loopEndBeat / maxBeat) * 100));
                    loopMarkerEnd.style.left = endPercentage + '%';
                    loopMarkerEnd.style.display = 'block';
                }
            } else {
                scrubBarProgress.style.width = '0%';
            }
        }

        function timeToBeat(time) {
            // Simple logic for single tempo:
            // Beat = 1 + (time - syncStart) * (BPM / 60)
            if (!state.syncInfo || state.tempos.length === 0) return 0;
            
            const start = state.syncInfo.syncStart;
            const bpm = state.tempos[0].bpm; // Use first tempo for now
            
            if (time < start) return 1; // Before start
            
            const secondsPerBeat = 60 / bpm;
            const beat = 1 + (time - start) / secondsPerBeat;
            return beat;
        }

        function updateVisuals(beat) {
            // Find active chord in current section timeline
            const timeline = state.timelines[state.currentSectionIndex];
            if (!timeline) return;
            
            const activeChord = timeline.chords.find(c => {
                return beat >= c.beat && beat < (c.beat + c.duration);
            });
            
            document.querySelectorAll('.chord-node').forEach(node => {
                node.classList.remove('active');
                const origColor = node.dataset.originalColor;
                if (origColor) {
                    node.style.borderColor = origColor;
                    const rgb = parseColorToRgb(origColor);
                    if (rgb) {
                        node.style.backgroundColor = `rgba(${rgb[0]}, ${rgb[1]}, ${rgb[2]}, 0.3)`;
                    }
                    node.style.boxShadow = '';
                }
                
                if (activeChord) {
                    // Match visual node by roman/absolute (use formatted values)
                    // The timeline chords have both roman_numeral/absolute_name (raw) and roman/absolute (formatted)
                    // Nodes store formatted values in dataset, so compare with formatted values
                    const activeRoman = activeChord.roman || activeChord.roman_numeral;
                    const activeAbsolute = activeChord.absolute || activeChord.absolute_name;
                    
                    if (node.dataset.roman === activeRoman && 
                        node.dataset.absolute === activeAbsolute) {
                        node.classList.add('active');
                        // Apply brightened color for active state
                        if (origColor) {
                            const brightened = brightenAndSaturate(origColor, 30, 50);
                            node.style.borderColor = brightened;
                            const rgb = parseColorToRgb(brightened);
                            if (rgb) {
                                node.style.backgroundColor = `rgba(${rgb[0]}, ${rgb[1]}, ${rgb[2]}, 0.7)`;
                            }
                            node.style.boxShadow = `0 0 20px ${brightened}`;
                        }
                    }
                }
            });
        }
        
        // --- Synth Implementation ---
        
        function setupSynthPlayback() {
            const timeline = state.timelines[state.currentSectionIndex];
            if (!timeline) return;
            
            // Set Tempo (with multiplier)
            if (state.tempos.length > 0) {
                Tone.Transport.bpm.value = state.tempos[0].bpm * state.tempoMultiplier;
            }
            
            // Clean up existing synths if any
            if (state.polySynth) {
                state.polySynth.dispose();
            }
            if (state.melodySynth) {
                state.melodySynth.dispose();
            }
            
            // Always create both synths (we'll control volume instead)
            state.polySynth = new Tone.PolySynth(Tone.Synth, {
                volume: state.chordVolume,
                oscillator: { type: "triangle" }
            }).toDestination();
            
            state.melodySynth = new Tone.Synth({
                volume: state.melodyVolume,
                oscillator: { type: "sine" }
            }).toDestination();
            
            // Schedule Chords (always schedule, volume controls whether we hear them)
            // Adjust for seek offset
            timeline.chords.forEach(chord => {
                // Time in Tone is usually beats if BPM is set? 
                // Tone.Transport.schedule expects seconds unless notation used.
                // Using "0:0:0" format requires meter.
                // Let's just use seconds relative to start.
                
                // Beat 1 is start. Tone starts at 0.
                // So Tone Time = (Chord Beat - 1) * (60/BPM)
                let startTime = beatToToneTime(chord.beat) - state.seekOffset;
                const duration = beatToToneTime(1 + chord.duration) - beatToToneTime(1);
                
                // Only schedule if start time is in the future (or very recent past)
                if (startTime >= -0.1) {
                    // Construct Notes from Chord (use comprehensive builder if available)
                    let notes = [];
                    
                    // Try to use the comprehensive builder first
                    if (chord.root !== undefined && chord.type !== undefined) {
                        notes = buildChordTones(chord);
                    } else {
                        // Fallback to parsing absolute name
                        const absName = chord.absolute || chord.absolute_name || "?";
                        if (absName !== "?") {
                            notes = getNotesForChord(chord);
                        } else {
                            // Last resort: single root note
                            const rootNote = chord.absolute?.match(/^[A-G][#b]?/);
                            if (rootNote) {
                                notes = [transposeNote(rootNote[0] + "4", state.chordOctaveOffset)];
                            } else {
                                notes = [transposeNote("C4", state.chordOctaveOffset)];
                            }
                        }
                    }
                    
                    // Track chord root for color highlighting during playback
                    const chordRoot = chord.root || null;
                    
                    // If arpeggiate mode is on, always store chord notes for display
                    if (state.arpeggiate) {
                        // Always update chord notes when a new chord starts - this happens immediately during scheduling
                        state.arpeggiateChordNotes = [...notes];
                        // Track chord root for color
                        state.currentPlayingChordRoot = chordRoot;
                        // Don't clear currentArpeggiateNote here - let it persist until first note of new chord plays
                        // Force immediate panel update to show new chord notes
                        updateNotesPanel();
                        
                        // Also schedule an update right when the chord actually starts playing
                        Tone.Transport.schedule((time) => {
                            // Ensure chord notes are set when chord actually starts
                            if (state.arpeggiateChordNotes.length === 0 || 
                                JSON.stringify(state.arpeggiateChordNotes.sort()) !== JSON.stringify(notes.sort())) {
                                state.arpeggiateChordNotes = [...notes];
                                state.currentPlayingChordRoot = chordRoot;
                                updateNotesPanel();
                            }
                        }, startTime);
                    } else {
                        // Track chord root for normal playback
                        state.currentPlayingChordRoot = chordRoot;
                    }
                    
                    if (state.arpeggiate && notes.length > 1) {
                        // Arpeggiate: schedule notes sequentially, one at a time, looping continuously
                        const noteDelay = state.arpeggiateSpeed / 1000; // Convert ms to seconds
                        const noteDuration = noteDelay * 0.8; // Ensure notes don't overlap
                        const cycleDuration = noteDelay * notes.length; // Time for one complete cycle
                        
                        // Store a reference to this chord's notes to ensure we only clear highlights for this chord
                        const chordNotesSet = new Set(notes);
                        
                        // Schedule multiple cycles to fill the chord duration
                        let cycleStartTime = startTime;
                        let cycleCount = 0;
                        const maxCycles = Math.ceil(duration / cycleDuration) + 1; // Extra cycle to ensure coverage
                        
                        while (cycleStartTime < startTime + duration && cycleCount < maxCycles) {
                            notes.forEach((note, index) => {
                                const noteStartTime = cycleStartTime + (index * noteDelay);
                                // Only schedule if within chord duration
                                if (noteStartTime < startTime + duration) {
                                    Tone.Transport.schedule((time) => {
                                        if (state.polySynth) {
                                            // Ensure chord notes are still set (in case they were cleared)
                                            if (state.arpeggiateChordNotes.length === 0 || 
                                                !state.arpeggiateChordNotes.some(n => chordNotesSet.has(n))) {
                                                state.arpeggiateChordNotes = [...notes];
                                            }
                                            
                                            // Clear previous note highlight only if it's from a different chord
                                            const previousNote = state.currentArpeggiateNote;
                                            if (previousNote && !chordNotesSet.has(previousNote)) {
                                                state.currentArpeggiateNote = null;
                                                updateNotesPanel();
                                            }
                                            
                                            // Update current arpeggiate note
                                            state.currentArpeggiateNote = note;
                                            updateNotesPanel();
                                            
                                            state.polySynth.triggerAttackRelease(note, noteDuration, time);
                                            
                                            // Clear current note highlight after it finishes playing
                                            setTimeout(() => {
                                                // Only clear if this note is still the current one and belongs to this chord
                                                if (state.currentArpeggiateNote === note && chordNotesSet.has(note)) {
                                                    state.currentArpeggiateNote = null;
                                                    updateNotesPanel();
                                                }
                                            }, noteDuration * 1000);
                                        }
                                    }, noteStartTime);
                                }
                            });
                            cycleStartTime += cycleDuration;
                            cycleCount++;
                        }
                        
                        // Clear current note highlight after chord duration, but keep chord notes visible
                        setTimeout(() => {
                            // Only clear the current note highlight, keep chord notes for display
                            if (state.currentArpeggiateNote !== null) {
                                state.currentArpeggiateNote = null;
                                updateNotesPanel();
                            }
                            // Don't clear arpeggiateChordNotes here - let them persist until next chord
                        }, duration * 1000);
                    } else {
                        // Normal: play all notes simultaneously
                        // Generate unique chord ID for tracking overlapping chords
                        const chordId = `chord_${state.chordIdCounter++}_${chord.beat}_${Date.now()}`;
                        
                    Tone.Transport.schedule((time) => {
                        if (state.polySynth) {
                                // Track chord notes with reference counting to handle overlapping chords
                                notes.forEach(note => {
                                    if (!state.chordNoteReferences.has(note)) {
                                        state.chordNoteReferences.set(note, new Set());
                                    }
                                    state.chordNoteReferences.get(note).add(chordId);
                                    state.currentlyPlayingChords.add(note);
                                });
                                
                                // Track chord root for color
                                const chordRoot = chord.root || null;
                                state.currentPlayingChordRoot = chordRoot;
                                
                                // Update paused notes if paused
                                if (state.isPaused) {
                                    state.pausedChordNotes = Array.from(state.currentlyPlayingChords);
                                }
                                
                                updateNotesPanel();
                                
                            state.polySynth.triggerAttackRelease(notes, duration, time);
                                
                                // Remove notes after duration (only if no other chord is playing them)
                                setTimeout(() => {
                                    notes.forEach(note => {
                                        const refSet = state.chordNoteReferences.get(note);
                                        if (refSet) {
                                            refSet.delete(chordId);
                                            // Only remove from display if no other chords are playing this note
                                            if (refSet.size === 0) {
                                                state.currentlyPlayingChords.delete(note);
                                                state.chordNoteReferences.delete(note);
                                            }
                                        }
                                    });
                                    
                                    // Update paused notes if paused (keep them visible)
                                    if (state.isPaused) {
                                        state.pausedChordNotes = Array.from(state.currentlyPlayingChords);
                                    }
                                    
                                    updateNotesPanel();
                                }, duration * 1000);
                        }
                    }, startTime);
                    }
                }
            });
            
            // Schedule Melody (always schedule, volume controls whether we hear them)
            // Adjust for seek offset
            timeline.notes.forEach(note => {
                let startTime = beatToToneTime(note.beat) - state.seekOffset;
                const duration = beatToToneTime(1 + note.duration) - beatToToneTime(1);
                const pitch = getPitchForNote(note);
                
                if (pitch && !note.isRest && startTime >= -0.1) {
                    Tone.Transport.schedule((time) => {
                        if (state.melodySynth) {
                            // Track melody note
                            state.currentlyPlayingMelody.add(pitch);
                            
                            // Track melody scale degree for color
                            if (note.sd) {
                                // Extract numeric scale degree from sd string (e.g., "1", "b3", "#4")
                                const sdMatch = note.sd.match(/^[#b]?(\d+)/);
                                if (sdMatch) {
                                    state.currentMelodyScaleDegree = parseInt(sdMatch[1]);
                                }
                            }
                            
                            // Update paused notes if paused
                            if (state.isPaused) {
                                state.pausedMelodyNotes = Array.from(state.currentlyPlayingMelody);
                                state.pausedMelodyScaleDegree = state.currentMelodyScaleDegree;
                            }
                            
                            updateNotesPanel();
                            
                            state.melodySynth.triggerAttackRelease(pitch, duration, time);
                            
                            // Remove note after duration
                            setTimeout(() => {
                                state.currentlyPlayingMelody.delete(pitch);
                                
                                // Clear scale degree when note stops (unless paused)
                                if (!state.isPaused) {
                                    // Only clear if this was the last note
                                    if (state.currentlyPlayingMelody.size === 0) {
                                        state.currentMelodyScaleDegree = null;
                                    }
                                } else {
                                    // Update paused notes if paused (keep them visible)
                                    state.pausedMelodyNotes = Array.from(state.currentlyPlayingMelody);
                                    // Keep paused scale degree if there are still notes
                                    if (state.currentlyPlayingMelody.size === 0) {
                                        state.pausedMelodyScaleDegree = null;
                                    }
                                }
                                
                                updateNotesPanel();
                            }, duration * 1000);
                        }
                    }, startTime);
                }
            });
        }
        
        function beatToToneTime(beat) {
            const bpm = (state.tempos[0]?.bpm || 120) * state.tempoMultiplier;
            return (beat - 1) * (60 / bpm);
        }
        
        // Helper function to transpose a note string (e.g., "C4") by an octave offset
        function transposeNote(noteString, octaveOffset) {
            if (!noteString || typeof noteString !== 'string') return noteString;
            const match = noteString.match(/^([A-G][#b]?)(\d+)$/);
            if (!match) return noteString;
            const noteName = match[1];
            const octave = parseInt(match[2]);
            const newOctave = Math.max(0, Math.min(8, octave + octaveOffset));
            return noteName + newOctave;
        }

        function getPitchForNote(note) {
            // note.sd can be "1", "b3", "#4", etc.
            // state.key.tonic is e.g. "Eb"
            
            const tonic = state.key.tonic;
            const isMajor = state.key.scale === 'major';
            const sd = note.sd;
            const octaveOffset = note.octave;
            
            // Get scale spellings
            const keyScaleSpellings = {
                'C': ['C', 'D', 'E', 'F', 'G', 'A', 'B'],
                'C#': ['C#', 'D#', 'E#', 'F#', 'G#', 'A#', 'B#'],
                'Db': ['Db', 'Eb', 'F', 'Gb', 'Ab', 'Bb', 'C'],
                'D': ['D', 'E', 'F#', 'G', 'A', 'B', 'C#'],
                'Eb': ['Eb', 'F', 'G', 'Ab', 'Bb', 'C', 'D'],
                'E': ['E', 'F#', 'G#', 'A', 'B', 'C#', 'D#'],
                'F': ['F', 'G', 'A', 'Bb', 'C', 'D', 'E'],
                'F#': ['F#', 'G#', 'A#', 'B', 'C#', 'D#', 'E#'],
                'Gb': ['Gb', 'Ab', 'Bb', 'Cb', 'Db', 'Eb', 'F'],
                'G': ['G', 'A', 'B', 'C', 'D', 'E', 'F#'],
                'Ab': ['Ab', 'Bb', 'C', 'Db', 'Eb', 'F', 'G'],
                'A': ['A', 'B', 'C#', 'D', 'E', 'F#', 'G#'],
                'Bb': ['Bb', 'C', 'D', 'Eb', 'F', 'G', 'A'],
                'B': ['B', 'C#', 'D#', 'E', 'F#', 'G#', 'A#']
            };
            
            const minorScaleSpellings = {
                'C': ['C', 'D', 'Eb', 'F', 'G', 'Ab', 'Bb'],
                'C#': ['C#', 'D#', 'E', 'F#', 'G#', 'A', 'B'],
                'Db': ['Db', 'Eb', 'Fb', 'Gb', 'Ab', 'Bbb', 'Cb'],
                'D': ['D', 'E', 'F', 'G', 'A', 'Bb', 'C'],
                'Eb': ['Eb', 'F', 'Gb', 'Ab', 'Bb', 'Cb', 'Db'],
                'E': ['E', 'F#', 'G', 'A', 'B', 'C', 'D'],
                'F': ['F', 'G', 'Ab', 'Bb', 'C', 'Db', 'Eb'],
                'F#': ['F#', 'G#', 'A', 'B', 'C#', 'D', 'E'],
                'Gb': ['Gb', 'Ab', 'Bbb', 'Cb', 'Db', 'Ebb', 'Fb'],
                'G': ['G', 'A', 'Bb', 'C', 'D', 'Eb', 'F'],
                'Ab': ['Ab', 'Bb', 'Cb', 'Db', 'Eb', 'Fb', 'Gb'],
                'A': ['A', 'B', 'C', 'D', 'E', 'F', 'G'],
                'Bb': ['Bb', 'C', 'Db', 'Eb', 'F', 'Gb', 'Ab'],
                'B': ['B', 'C#', 'D', 'E', 'F#', 'G', 'A']
            };
            
            const scaleSpellings = isMajor ? keyScaleSpellings : minorScaleSpellings;
            const scale = scaleSpellings[tonic];
            
            // Calculate semitone offset from tonic for the scale degree
            // 1=0, b2=1, 2=2, b3=3, 3=4, 4=5, #4/b5=6, 5=7, b6=8, 6=9, b7=10, 7=11
            const sdMap = {
                '1': 0, '#1': 1, 'b2': 1, '2': 2, '#2': 3, 'b3': 3, '3': 4,
                '4': 5, '#4': 6, 'b5': 6, '5': 7, '#5': 8, 'b6': 8, '6': 9,
                '#6': 10, 'b7': 10, '7': 11
            };
            
            const offset = sdMap[sd];
            if (offset === undefined) return null; // Unknown SD
            
            // Major scale intervals: 0, 2, 4, 5, 7, 9, 11 semitones
            // Minor scale intervals: 0, 2, 3, 5, 7, 8, 10 semitones
            const majorIntervals = [0, 2, 4, 5, 7, 9, 11];
            const minorIntervals = [0, 2, 3, 5, 7, 8, 10];
            const scaleIntervals = isMajor ? majorIntervals : minorIntervals;
            
            // Find which scale degree this offset corresponds to
            const scaleDegreeIndex = scaleIntervals.findIndex(s => s === offset);
            
            let noteName;
            if (scaleDegreeIndex !== -1 && scale) {
                // It's a scale degree - use proper scale spelling
                noteName = scale[scaleDegreeIndex];
                
                // Handle alterations (flats/sharps in sd string)
                if (sd.includes('b') && !sd.startsWith('b')) {
                    // Flat alteration (e.g., "b3", "b7")
                    // Lower the note by a semitone
                    const chromatic = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
                    const flatMap = {'Db':'C#', 'Eb':'D#', 'Gb':'F#', 'Ab':'G#', 'Bb':'A#'};
                    function getIndex(noteName) {
                        const n = flatMap[noteName] || noteName;
                        return chromatic.indexOf(n);
                    }
                    const noteIndex = getIndex(noteName);
                    const loweredIndex = (noteIndex - 1 + 12) % 12;
                    const loweredSharp = chromatic[loweredIndex];
                    
                    // Convert to proper enharmonic
                    const useFlats = ['Db', 'Eb', 'Gb', 'Ab', 'Bb'].includes(tonic);
                    if (useFlats) {
                        const sharpToFlat = {
                            'C#': 'Db', 'D#': 'Eb', 'F#': 'Gb', 'G#': 'Ab', 'A#': 'Bb'
                        };
                        noteName = sharpToFlat[loweredSharp] || loweredSharp;
                    } else {
                        noteName = loweredSharp;
                    }
                } else if (sd.includes('#') && !sd.startsWith('#')) {
                    // Sharp alteration (e.g., "#4", "#5")
                    // Raise the note by a semitone
                    const chromatic = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
                    const flatMap = {'Db':'C#', 'Eb':'D#', 'Gb':'F#', 'Ab':'G#', 'Bb':'A#'};
                    function getIndex(noteName) {
                        const n = flatMap[noteName] || noteName;
                        return chromatic.indexOf(n);
                    }
                    const noteIndex = getIndex(noteName);
                    const raisedIndex = (noteIndex + 1) % 12;
                    const raisedSharp = chromatic[raisedIndex];
                    
                    // Convert to proper enharmonic

                    // Use arpeggiate chord notes (from playback)
                    chordNotes = [...state.arpeggiateChordNotes];
                } else if (state.currentlyPlayingChords.size > 0) {
                    // Fall back to currently playing chords if arpeggiateChordNotes is empty
                    chordNotes = Array.from(state.currentlyPlayingChords);
                } else if (state.clickedChordNotes.length > 0) {
                    // Use clicked chord notes as last resort (persist until music resumes or canvas click)
                    chordNotes = [...state.clickedChordNotes];
                } else {
                    chordNotes = [];
                }
            } else if (state.clickedChordNotes.length > 0) {
                // Use clicked chord notes if they exist (persist until music resumes or canvas click)
                chordNotes = [...state.clickedChordNotes];
            } else {
                // Normal mode: show currently playing notes
                chordNotes = Array.from(state.currentlyPlayingChords);
            }
            
            // Sort by MIDI note number (lowest to highest)
            chordNotes = sortNotesByMidi(chordNotes);
            
            // Determine which note should be highlighted
            const currentNoteToHighlight = state.arpeggiate && state.currentArpeggiateNote !== null 
                ? state.currentArpeggiateNote 
                : null;
            
            // Get chord color based on clicked chord root or currently playing chord
            let chordColor = null;
            if (state.clickedChordRoot) {
                // Use clicked chord color
                chordColor = getColorByRoot(state.clickedChordRoot);
            } else if (state.currentPlayingChordRoot) {
                // Use currently playing chord root color
                chordColor = getColorByRoot(state.currentPlayingChordRoot);
            }
            
            for (let i = 0; i < 4; i++) {
                const chordSlot = document.getElementById(`chord-slot-${i}`);
                if (chordSlot) {
                    const note = chordNotes[i] || null;
                    // Check if this note should be highlighted (must be in arpeggiate mode and match current note)
                    // Use strict string comparison to ensure exact match
                    const isCurrentArpeggiateNote = state.arpeggiate && 
                                                   currentNoteToHighlight !== null && 
                                                   note !== null && 
                                                   String(note) === String(currentNoteToHighlight);
                    updateNoteSlot(chordSlot, note, 'chord', isCurrentArpeggiateNote, chordColor);
                }
            }
            }
            
        // Update a single note slot
        function updateNoteSlot(slot, noteString, type, isHighlighted = false, noteColor = null) {
            if (!slot) return;
            
            // Clear existing content
            slot.innerHTML = '';
            slot.className = 'note-slot';
            
            // Reset styles
            slot.style.borderColor = '';
            slot.style.boxShadow = '';
            slot.style.backgroundColor = '';
            
            if (noteString) {
                const midi = noteToMidi(noteString);
                if (midi !== null) {
                    slot.classList.add('has-note', 'playing');
                    
                    // Add highlight class if this is the current arpeggiate note
                    if (isHighlighted) {
                        slot.classList.add('arpeggiate-current');
                    }
                    
                    // Apply color if provided
                    if (noteColor) {
                        slot.style.borderColor = noteColor;
                        slot.style.boxShadow = `0 0 8px ${noteColor}40`;
                        // Add subtle background color
                        const rgb = parseColorToRgb(noteColor);
                        if (rgb) {
                            slot.style.backgroundColor = `rgba(${rgb[0]}, ${rgb[1]}, ${rgb[2]}, 0.15)`;
                        }
                    }
                    
                    const number = document.createElement('span');
                    number.className = 'note-number';
                    number.textContent = midi;
                    
                    const name = document.createElement('span');
                    name.className = 'note-name';
                    name.textContent = noteString;
                    
                    // Click handler to play the note
                    const playNote = async () => {
                        if (Tone.context.state !== 'running') {
                            await Tone.start();
                        }
                        const synth = new Tone.Synth({
                            volume: type === 'chord' ? state.chordVolume : state.melodyVolume,
                            oscillator: { type: type === 'chord' ? 'triangle' : 'sine' }
                        }).toDestination();
                        synth.triggerAttackRelease(noteString, '8n', Tone.now());
                        setTimeout(() => synth.dispose(), 1000);
                    };
                    
                    number.onclick = playNote;
                    name.onclick = playNote;
                    slot.onclick = playNote;
                    
                    slot.appendChild(number);
                    slot.appendChild(name);
                } else {
                    // Invalid note - show placeholder
                    slot.classList.add('empty');
                    const placeholder = document.createElement('span');
                    placeholder.className = 'note-placeholder';
                    placeholder.textContent = '—';
                    slot.appendChild(placeholder);
                }
            } else {
                // Empty slot
                slot.classList.add('empty');
                const placeholder = document.createElement('span');
                placeholder.className = 'note-placeholder';
                placeholder.textContent = '—';
                slot.appendChild(placeholder);
            }
        }
        
        // Create a note item element
        function createNoteItem(noteString, midi, type) {
            const item = document.createElement('div');
            item.className = 'note-item playing';
            item.dataset.note = noteString;
            item.dataset.type = type;
            
            const number = document.createElement('span');
            number.className = 'note-number';
            number.textContent = midi;
            
            const name = document.createElement('span');
            name.className = 'note-name';
            name.textContent = noteString;
            
            // Click handler to play the note
            const playNote = async () => {
                if (Tone.context.state !== 'running') {
                    await Tone.start();
                }
                const synth = new Tone.Synth({
                    volume: type === 'chord' ? state.chordVolume : state.melodyVolume,
                    oscillator: { type: type === 'chord' ? 'triangle' : 'sine' }
                }).toDestination();
                synth.triggerAttackRelease(noteString, '8n', Tone.now());
                setTimeout(() => synth.dispose(), 1000);
            };
            
            number.onclick = playNote;
            name.onclick = playNote;
            
            item.appendChild(number);
            item.appendChild(name);
            
            return item;
        }
        
        async function startChordPlayback(chord) {
            // This requires Tone.js to be started (user gesture)
            if (Tone.context.state !== 'running') {
                await Tone.start();
            }
            
            // Build comprehensive chord tones from chord data structure
            let notes = [];
            
            // Try to use the comprehensive builder first
            if (chord.root !== undefined && chord.type !== undefined) {
                notes = buildChordTones(chord);
            } else {
                // Fallback to parsing absolute name
                const absName = chord.absolute || chord.absolute_name || "?";
                if (absName !== "?") {
                    notes = getNotesForChord(chord);
                } else {
                    // Last resort: single root note
                    const rootNote = chord.absolute?.match(/^[A-G][#b]?/);
                    if (rootNote) {
                        notes = [transposeNote(rootNote[0] + "4", state.chordOctaveOffset)];
                    } else {
                        notes = [transposeNote("C4", state.chordOctaveOffset)];
                    }
                }
            }
            
            // Track chord notes for display
            notes.forEach(note => state.currentlyPlayingChords.add(note));
            
            // Always store clicked chord notes for persistent display
            // They will be cleared when music resumes or canvas is clicked
            state.clickedChordNotes = [...notes];
            updateNotesPanel();
            
            // Check if arpeggiation is enabled
            if (state.arpeggiate && notes.length > 1) {
                // Arpeggiate: play notes sequentially, one at a time, looping continuously
                const synth = new Tone.Synth({
                    volume: -8,
                    oscillator: { type: "triangle" }
                }).toDestination();
                
                // Clear previous chord state before setting new one
                state.currentArpeggiateNote = null;
                // Store all chord notes for arpeggiate display
                state.arpeggiateChordNotes = [...notes];
                updateNotesPanel();
                
                const noteDelay = state.arpeggiateSpeed; // Delay in milliseconds
                const noteDuration = noteDelay * 0.8 / 1000; // Convert to seconds, ensure no overlap
                let currentNoteIndex = 0;
                let isPlaying = true;
                let timeoutId = null;
                
                // Function to play the next note in sequence
                const playNextNote = () => {
                    if (!isPlaying) return;
                    
                    const note = notes[currentNoteIndex];
                    
                    // Clear previous note highlight before starting new one
                    const previousNote = state.currentArpeggiateNote;
                    if (previousNote && previousNote !== note) {
                        state.currentArpeggiateNote = null;
                        updateNotesPanel();
                    }
                    
                    // Update current arpeggiate note
                    state.currentArpeggiateNote = note;
                    updateNotesPanel();
                    
                    synth.triggerAttackRelease(note, noteDuration, Tone.now());
                    
                    // Clear current note highlight after it finishes playing
                    setTimeout(() => {
                        // Only clear if this note is still the current one
                        if (state.currentArpeggiateNote === note) {
                            state.currentArpeggiateNote = null;
                            updateNotesPanel();
                        }
                    }, noteDuration * 1000);
                    
                    // Move to next note, loop back to start
                    currentNoteIndex = (currentNoteIndex + 1) % notes.length;
                    
                    // Schedule next note using setTimeout (more reliable for clicked nodes)
                    if (isPlaying) {
                        timeoutId = setTimeout(() => {
                            playNextNote();
                        }, noteDelay);
                    }
                };
                
                // Start the arpeggiation loop
                playNextNote();
                
                // Return an object that mimics PolySynth interface
                return {
                    synth: synth,
                    timeoutId: timeoutId,
                    isPlaying: () => isPlaying,
                    releaseAll: function() {
                        isPlaying = false;
                        if (timeoutId !== null) {
                            clearTimeout(timeoutId);
                            timeoutId = null;
                        }
                        // Clear arpeggiate state
                        state.arpeggiateChordNotes = [];
                        state.currentArpeggiateNote = null;
                        synth.triggerRelease();
                        synth.dispose();
                    },
                    dispose: function() {
                        isPlaying = false;
                        if (timeoutId !== null) {
                            clearTimeout(timeoutId);
                            timeoutId = null;
                        }
                        // Clear arpeggiate state
                        state.arpeggiateChordNotes = [];
                        state.currentArpeggiateNote = null;
                        synth.dispose();
                    }
                };
            } else {
                // Normal: play all notes simultaneously
            const synth = new Tone.PolySynth(Tone.Synth, {
                volume: -8,
                oscillator: { type: "triangle" }
            }).toDestination();
                
                // Cleanup function to remove notes from display
                const cleanup = () => {
                    notes.forEach(note => {
                        state.currentlyPlayingChords.delete(note);
                    });
                    updateNotesPanel();
                };
            
            // Trigger attack (notes will play until releaseAll is called)
            synth.triggerAttack(notes);
            
                // Wrap synth to add cleanup on release/dispose
                const wrappedSynth = {
                    triggerAttack: (notes, time) => synth.triggerAttack(notes, time),
                    triggerRelease: (notes, time) => synth.triggerRelease(notes, time),
                    triggerAttackRelease: (notes, duration, time) => synth.triggerAttackRelease(notes, duration, time),
                    releaseAll: function() {
                        cleanup();
                        synth.releaseAll();
                    },
                    dispose: function() {
                        cleanup();
                        synth.dispose();
                    },
                    cleanup: cleanup
                };
                
                return wrappedSynth;
            }
        }
        
        // Legacy function for backwards compatibility (if needed elsewhere)
        async function playChordDemo(chord) {
            const synth = await startChordPlayback(chord);
            // Play for 1 second then stop
            setTimeout(() => {
                synth.releaseAll();
                synth.dispose();
            }, 1000);
        }

        // --- Boot ---
        window.addEventListener('load', () => {
            init();
            setupZoom();
        });
        
        // Recalculate scale on window resize
        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                if (state.maxDistance > 0) {
                    scaleToFit(state.maxDistance);
                }
            }, 100);
        });

        // Scroll wheel zoom and drag pan - set up after DOM is ready
        function setupZoom() {
            const visualizerContainer = document.getElementById('visualizer-container');
            if (visualizerContainer) {
                // Scroll wheel zoom
                visualizerContainer.addEventListener('wheel', (e) => {
                    e.preventDefault();
                    
                    // Zoom in/out based on scroll direction (less sensitive)
                    const zoomSpeed = 0.03;
                    const delta = e.deltaY > 0 ? -zoomSpeed : zoomSpeed;
                    
                    // Update zoom (clamp between 0.1 and 5)
                    state.zoom = Math.max(0.1, Math.min(5, state.zoom + delta));
                    
                    // Apply the new zoom
                    applyScale();
                }, { passive: false });

                // Mouse drag pan
                visualizerContainer.addEventListener('mousedown', (e) => {
                    // Only start drag on left click and not on a node
                    if (e.button === 0 && !e.target.closest('.chord-node')) {
                        state.isDragging = true;
                        state.dragStartX = e.clientX;
                        state.dragStartY = e.clientY;
                        state.dragStartTranslateX = state.translateX;
                        state.dragStartTranslateY = state.translateY;
                        visualizerContainer.style.cursor = 'grabbing';
                        container.classList.add('dragging'); // Disable transition during drag
                        e.preventDefault();
                    }
                });

                visualizerContainer.addEventListener('mousemove', (e) => {
                    if (state.isDragging) {
                        // Calculate new translation
                        const deltaX = e.clientX - state.dragStartX;
                        const deltaY = e.clientY - state.dragStartY;
                        state.translateX = state.dragStartTranslateX + deltaX;
                        state.translateY = state.dragStartTranslateY + deltaY;
                        applyScale();
                        e.preventDefault();
                    }
                });

                visualizerContainer.addEventListener('mouseup', (e) => {
                    // Always clear dragging state on mouseup, regardless of button
                    if (state.isDragging) {
                        state.isDragging = false;
                        visualizerContainer.style.cursor = '';
                        container.classList.remove('dragging'); // Re-enable transition
                        
                        // Also clear any node dragging states
                        document.querySelectorAll('.chord-node').forEach(n => {
                            if (n.isDragging) {
                                n.isDragging = false;
                                n.dragStartX = null;
                                n.dragStartY = null;
                            }
                        });
                        
                        e.preventDefault();
                    }
                });
                
                // Clear clicked chord notes and node highlighting when clicking on canvas (not on a node)
                visualizerContainer.addEventListener('click', (e) => {
                    // Only clear if clicking directly on the container (not on a node)
                    if (e.target === visualizerContainer || e.target === container || e.target.id === 'ring-center') {
                        state.clickedChordNotes = [];
                        state.clickedChordRoot = null;
                        // Remove highlighting from clicked node
                        if (state.clickedNode) {
                            removeNodeActive(state.clickedNode);
                            state.clickedNode = null;
                        }
                        updateNotesPanel();
                    }
                });

                visualizerContainer.addEventListener('mouseleave', () => {
                    // Clear dragging state when mouse leaves container
                    if (state.isDragging) {
                        state.isDragging = false;
                        visualizerContainer.style.cursor = '';
                        container.classList.remove('dragging'); // Re-enable transition
                        
                        // Also clear any node dragging states
                        document.querySelectorAll('.chord-node').forEach(n => {
                            if (n.isDragging) {
                                n.isDragging = false;
                                n.dragStartX = null;
                                n.dragStartY = null;
                            }
                        });
                    }
                });
            }
        }
        
        // Global mouseup handler to catch any missed mouseup events
        // This ensures dragging never gets stuck
        document.addEventListener('mouseup', (e) => {
            // Only clear if we're actually dragging (don't interfere with other interactions)
            if (state.isDragging) {
                state.isDragging = false;
                const visualizerContainer = document.getElementById('visualizer-container');
                if (visualizerContainer) {
                    visualizerContainer.style.cursor = '';
                }
                container.classList.remove('dragging');
                
                // Clear all node dragging states
                document.querySelectorAll('.chord-node').forEach(n => {
                    if (n.isDragging) {
                        n.isDragging = false;
                        n.dragStartX = null;
                        n.dragStartY = null;
                    }
                });
            }
        });

    </script>
